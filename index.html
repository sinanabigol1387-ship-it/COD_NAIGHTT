<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COD_NAIGHT | فروش اکانت بازی</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:#111;
color:#fff;
}

header{
background:#181818;
padding:30px;
text-align:center;
box-shadow:0 0 15px #00aaff;
}

header h1{
font-size:42px;
color:#00aaff;
}

header p{
margin-top:10px;
color:#bbb;
}

.channel{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#00aaff;
color:white;
text-decoration:none;
border-radius:10px;
}

.search{
display:flex;
justify-content:center;
gap:10px;
margin:30px;
}

.search input{
padding:12px;
width:250px;
border:none;
border-radius:10px;
}

.search button{
padding:12px 20px;
background:#00aaff;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,170,255,.3);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.price{
color:#00ff88;
font-size:20px;
margin:10px 0;
}

.status{
color:#00ff66;
}

footer{
text-align:center;
padding:20px;
color:#777;
}
</style>

</head>
<body>

<header>

<h1>COD_NAIGHT</h1>

<p>فروش اکانت بازی</p>

<a class="channel"
href="https://splus.ir/COD_NAIGHT"
target="_blank">

📢 ورود به کانال

</a>

</header>

<div class="search">

<input id="search"
placeholder="کد آگهی را وارد کنید">

<button onclick="findAd()">

جستجو

</button>

</div>

<div class="container">

<div class="card" id="4700">

<h2>🎮 Clash of Clans</h2>

<p>کد آگهی: <b>4700</b></p>

<p>تاون هال: 17 MAX</p>

<p class="price">8,500,000 تومان</p>

<p class="status">🟢 موجود</p>

</div>

<div class="card" id="4812">

<h2>🎮 PUBG Mobile</h2>

<p>کد آگهی: <b>4812</b></p>

<p>Level 82</p>

<p class="price">3,200,000 تومان</p>

<p class="status">🟢 موجود</p>

</div>

<div class="card" id="5290">

<h2>🎮 Free Fire</h2>

<p>کد آگهی: <b>5290</b></p>

<p>Level 75</p>

<p class="price">1,900,000 تومان</p>

<p class="status">🟢 موجود</p>

</div>

</div>

<footer>

© 2026 COD_NAIGHT

</footer>

<script>

function findAd(){

let code=document.getElementById("search").value;

let ad=document.getElementById(code);

if(ad){

ad.scrollIntoView({behavior:"smooth"});

ad.style.border="3px solid gold";

}else{

alert("آگهی پیدا نشد!");

}

}

</script>

</body>
</html>
